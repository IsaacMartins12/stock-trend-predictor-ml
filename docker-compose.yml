x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: 'stock-predictor-secret-key'
    # App database connection
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: stock_predictor
    POSTGRES_USER: stock_user
    POSTGRES_PASSWORD: stock_pass
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./configs:/opt/airflow/configs
    - ./models:/opt/airflow/models
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    airflow-postgres:
      condition: service_healthy

services:
  # ============================================
  # Data Warehouse - PostgreSQL (Medallion Architecture)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: stock_predictor_db
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass
      POSTGRES_DB: stock_predictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infrastructure/medallion_schema.sql:/docker-entrypoint-initdb.d/02_medallion.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_predictor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Airflow Metadata Database
  # ============================================
  airflow-postgres:
    image: postgres:16-alpine
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Apache Airflow - Webserver
  # ============================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@stock-predictor.local
        echo "Airflow initialized successfully"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # Apache Airflow - Scheduler
  # ============================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # FastAPI - Model Serving API
  # ============================================
  api:
    build: .
    container_name: stock_predictor_api
    command: ["python", "-m", "uvicorn", "src.serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: stock_predictor
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass
      MODELS_DIR: /opt/airflow/models
    volumes:
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # ============================================
  # Grafana - Monitoring Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: stock_predictor_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  airflow_postgres_data:
  grafana_data:
 